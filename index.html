<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 200;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: transparent;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #667eea);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradient-shift 6s ease infinite;
    }

    .subtitle {
      margin-top: 1.5rem;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.35);
      animation: fade-in 2s ease 0.5s both;
    }

    .line {
      width: 60px;
      height: 1px;
      margin: 2rem auto 0;
      background: linear-gradient(90deg, transparent, rgba(118, 75, 162, 0.6), transparent);
      animation: fade-in 2s ease 1s both, pulse-line 3s ease-in-out infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-line {
      0%, 100% { width: 60px; opacity: 0.6; }
      50% { width: 120px; opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="content">
    <h1>Coming Soon</h1>
    <p class="subtitle">Something new is on its way</p>
    <div class="line"></div>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function createParticles() {
      const count = Math.min(80, Math.floor((w * h) / 15000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.1,
      }));
    }

    const LINK_DIST = 150;

    function draw() {
      ctx.clearRect(0, 0, w, h);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(118, 75, 162, ${p.alpha})`;
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `rgba(102, 126, 234, ${0.15 * (1 - dist / LINK_DIST)})`;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); createParticles(); });
    resize();
    createParticles();
    draw();
  </script>
</body>
</html>
